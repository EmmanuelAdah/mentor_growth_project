<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <style>
        body { font-family: 'Helvetica', sans-serif; color: #333; padding: 20px; background-color: #f9f9f9; }
        .receipt-card {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            max-width: 300px;
            margin: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .receipt-header {
            text-align: center;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        .bank-logo { font-size: 20px; font-weight: 800; color: #0056b3; display: block; }
        .status-badge {
            display: inline-block;
            margin-top: 10px;
            background: #e6fcf5;
            color: #087f5b;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .label { color: #777; }
        .value { font-weight: 600; text-align: right; color: #222; }
        .amount-section {
            text-align: center;
            margin: 25px 0;
            padding: 20px 0;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
        }
        .amount-value { font-size: 28px; font-weight: 800; color: #000; }
        .footer {
            margin-top: 30px;
            font-size: 13px;
            text-align: center;
            color: #999;
            line-height: 1.5;
        }
    </style>
    <title>Payment Receipt</title>
</head>
<body>

<div class="receipt-card">
    <div class="receipt-header">
        <span class="bank-logo">MENTOR GROWTH PAY</span>
        <div class="status-badge">SUCCESSFUL</div>
    </div>

    <div class="amount-section">
        <div class="label" style="margin-bottom: 5px;">Amount Paid</div>
        <!--/*@thymesVar id="transaction" type=""*/-->
        <div class="amount-value" th:text="'₦' + ${payment.amount}">NGN 5,000.00</div>
    </div>

    <div class="detail-row">
        <span class="label">Reference</span>
        <span class="value" th:text="${payment.reference}">TXN-88291022</span>
    </div>

    <div class="detail-row">
        <span class="label">Date & Time</span>
        <span class="value" th:text="${payment.createdAt}">March 7, 2026 12:42 PM</span>
    </div>

    <div class="detail-row" th:with="fullName=${payment.mentee.firstName + ' ' + payment.mentee.lastName}">
        <span class="label">Sender</span>
        <span class="value" th:text="${fullName}">John Doe</span>
    </div>

    <div class="detail-row" th:with="fullName=${payment.mentor.firstName + ' ' + payment.mentor.lastName}">
        <span class="label">Recipient</span>
        <span class="value" th:text="${fullName}">John Doe</span>
    </div>

    <div class="footer">
        <p>This receipt confirms that the transaction above has been completed successfully on the Mentor Growth platform.</p>
        <p>Support: edogbanya02@gmail.com</p>
    </div>
</div>

</body>
</html>
